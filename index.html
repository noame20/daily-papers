atial-Temporal Grounding for 3D Functionality Segmentation",cn_title:"UniFunc3D：统一主动空间-时间定位的3D功能分割技术",tagline:"让AI像人类一样「看」懂3D世界中的物品功能！点击了解如何用大模型实现精准的开关、把手、旋钮定位。",date:"2026-03-26"},{id:"2603.23495",title:"VISion On Request: Enhanced VLLM efficiency with sparse, dynamically selected, vision-language interactions",cn_title:"VISion On Request：稀疏动态选择视觉-语言交互提升VLLM效率",tagline:"让多模态AI变快变省！聪明地「看」图——只对必要区域进行视觉计算，效率提升数倍，效果几乎不降。",date:"2026-03-26"},{id:"2603.23497",title:"WildWorld: A Large-Scale Dataset for Dynamic World Modeling with Actions and Explicit State toward Generative ARPG",cn_title:"WildWorld：面向生成式ARPG的动作与显式状态动态世界建模大规模数据集",tagline:"让AI学会在虚拟游戏世界中「生存」！大规模数据集教AI理解物理交互、状态变化，赋能下一代游戏AI训练。",date:"2026-03-25"},{id:"2603.23499",title:"DA-Flow: Degradation-Aware Optical Flow Estimation with Diffusion Models",cn_title:"DA-Flow：让AI在模糊视频中也能精准捕捉运动",tagline:"扩散模型跨界来帮忙！即使视频模糊、噪点多，AI也能准确估计物体运动轨迹",date:"2026-03-25"},{id:"2603.23500",title:"UniGRPO: Unified Policy Optimization for Reasoning-Driven Visual Generation",cn_title:"UniGRPO：统一策略优化实现推理驱动的视觉生成",tagline:"让AI在生成图片时也能「思考推理」！新型训练方法统一了视觉生成与推理能力，生成质量大幅提升。",date:"2026-03-25"},{id:"2603.23471",title:"Regulating AI Agents",cn_title:"Regulating AI Agents",tagline:"",date:""},{id:"2603.20192",title:"LumosX: Relate Any Identities with Their Attributes for Personalized Video Generation",cn_title:"LumosX：关联身份与属性实现个性化视频生成",tagline:"让AI根据你的喜好定制视频！输入人物照片，它就能生成这个人做任何动作的视频，就像私人导演一样。",date:"2026-03-24"},{id:"2603.20184",title:"Kolmogorov-Arnold causal generative models",cn_title:"Kolmogorov-Arnold 因果生成模型 (KaCGM)",tagline:"让 AI 的思考过程变得透明可解释！用「乐高积木」的方式拆解复杂函数，看懂 AI 如何做出每一个决策。专为高中生设计，通俗易懂！",date:"2026-03-24"},{id:"2603.20169",title:"EgoForge: Goal-Directed Egocentric World Simulator",cn_title:"EgoForge：目标导向的第一人称世界模拟器",tagline:"从第一人称视角构建AI世界模型！让AI学会理解「我」在做什么、周围环境如何响应，赋能AR/VR智能体。",date:"2026-03-24"},{id:"2603.20155",title:"Beyond Single Tokens: Distilling Discrete Diffusion Models via Discrete MMD",cn_title:"超越单Token：基于离散MMD的离散扩散模型蒸馏",tagline:"让AI图像生 解锁。",date:"2026-03-24"},{id:"2603.19234",title:"Matryoshka Gaussian Splatting",cn_title:"套娃高斯泼溅（Matryoshka Gaussian Splatting）",tagline:"3D重建提速10倍！像俄罗斯套娃一样分层处理，一张照片秒变3D模型。",date:"2026-03-24"},{id:"2603.19232",title:"Cubic Discrete Diffusion: Discrete Visual Generation on High-Dimensional Representation Tokens",cn_title:"立方离散扩散：基于高维表示Token的离散视觉生成",tagline:'新型AI生图范式！把图片切成"乐高积木"来生成，突破传统扩散模型的限制。',date:"2026-03-24"},{id:"2603.19231",title:"MonoArt: Progressive Structural Reasoning for Monocular Articulated 3D Reconstruction",cn_title:"MonoArt：单目关节式3D重建的渐进式结构推理",tagline:"单张照片重建可动3D模型！看清关节结构，AI能从任意角度观察物体运动。",date:"2026-03-24"},{id:"2603.19228",title:"SAMA: Factorized Semantic Anchoring and Motion Alignment for Instruction-Guided Video Editing",cn_title:"SAMA：指令导向视频编辑的因子化语义锚定与运动对齐",tagline:"说话就能剪视频！告诉AI你想怎么改，它精准定位物体并调整运动轨迹。",date:"2026-03-24"},{id:"2603.19227",title:"Bridging Semantic and Kinematic Conditions with Diffusion-based Discrete Motion Tokenizer",cn_title:"基于扩散的离散运动分词器：桥接语义与运动学条件",tagline:'教AI理解动作！把运动分解成"词汇"，让AI生成的动画动作更自然合理。',date:"2026-03-24"},{id:"2603.19223",title:"F2LLM-v2: Inclusive, Performant, and Efficient Embeddings for a Multilingual World",cn_title:"F2LLM-v2：面向多语言世界的包容、高性能、高效嵌入",tagline:"懂100种语言的AI embedding模型！支持方言和低资源语言，全球沟通无障碍。",date:"2026-03-24"},{id:"2603.19220",title:"Nemotron-Cascade 2: Post-Training LLMs with Cascade RL and Multi-Domain On-Policy Distillation",cn_title:"Nemotron-Cascade 2：级联强化学习与多领域在线策略蒸馏的后训练LLM",tagline:'NVIDIA黑科技！大模型训练新方法，多阶段"修炼"让AI能力飙升。',date:"2026-03-24"},{id:"2603.19217",title:"LVOmniBench: Pioneering Long Audio-Video Understanding Evaluation for Omnimodal LLMs",cn_title:"LVOmniBench：开创性的长音视频理解评测基准",tagline:'给AI的"视力"和"听力"打分！测试多模态大模型理解长视频的能力。',date:"2026-03-24"},{id:"2603.19216",title:"DreamPartGen: Semantically Grounded Part-Level 3D Generation via Collaborative Latent Denoising",cn_title:"DreamPartGen：协作潜空间去噪的语义锚定部件级3D生成",tagline:"想生成特定部件的3D模型？输入文字描述，AI精准生成你想要的零件或整体。",date:"2026-03-24"},{id:"2603.19203",title:"Tinted Frames: Question Framing Blinds Vision-Language Models",cn_title:"色彩框架：问题措辞如何影响视觉语言模型",tagline:'AI看图也会"先入为主"！同一个问题换种问法，AI答案可能完全不同，这很危险。',date:"2026-03-24"},{id:"2603.19199",title:"FASTER: Rethinking Real-Time Flow VLAs",cn_title:"FASTER：重新思考实时流式视觉-语言-动作模型",tagline:"机器人反应太慢？重新设计算法让AI能实时看视频做决策，速度大幅提升。",date:"2026-03-24"},{id:"2603.19173",title:"SOL-ExecBench: Speed-of-Light Benchmarking for Real-World GPU Kernels Against Hardware Limits",cn_title:"SOL-ExecBench：GPU内核与硬件极限的光速基准测试",tagline:'GPU性能有多少水分？用"光速基准"测试真实性能，找出硬件瓶颈在哪里。',date:"2026-03-24"},{id:"2603.19146",title:"D5P4: Partition Determinantal Point Process for Diversity in Parallel Discrete Diffusion Decoding",cn_title:"D5P4：用于并行离散扩散解码多样性的划分行列式点过程",tagline:"AI生成图片不再千篇一律！新算法让多个生成结果各具特色，适合创意设计。",date:"2026-03-24"}];(0,P.createRoot)(document.getElementById("root")).render((0,C.jsx)(N.StrictMode,{children:(0,C.jsx)(function(){let[e,t]=(0,N.useState)(""),[n,r]=(0,N.useState)(10),[l,a]=(0,N.useState)(1),[o,i]=(0,N.useState)(!1);(0,N.useEffect)(()=>{a(1)},[e,n]);let s=(0,N.useMemo)(()=>{if(!e.trim())return aE;let t=e.toLowerCase();return aE.filter(e=>e.cn_title.toLowerCase().includes(t)||e.title.toLowerCase().includes(t)||e.tagline.toLowerCase().includes(t)||e.id.includes(t))},[e]),u=(0,N.useMemo)(()=>{let e={};for(let t of s){let n=t.date||"未知日期";e[n]||(e[n]=[]),e[n].push(t)}return Object.entries(e).sort(([e],[t])=>t.localeCompare(e))},[s]),c=Math.ceil(s.length/n),d=(0,N.useMemo)(()=>{let e=0,t=[];for(let[r,a]of u){let o=(l-1)*n,i=o+n;if(e>=i)break;let s=Math.max(0,o-e),u=Math.max(0,i-e),c=a.slice(s,u);c.length>0&&t.push([r,c]),e+=a.length}return t},[u,l,n]);return(0,C.jsxs)("div",{className:"min-h-screen bg-[#F7F4EF]",children:[(0,C.jsx)("header",{className:"max-w-[1100px] mx-auto px-6 py-[60px] border-b-2 border-[#1C1917]",children:(0,C.jsxs)("div",{className:"flex items-start justify-between",children:[(0,C.jsxs)("div",{className:"flex-1",children:[(0,C.jsx)("div",{className:"text-[11px] tracking-[3px] uppercase text-[#B54
